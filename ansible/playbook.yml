---
- name: Configure full server state (Docker, containers, Nginx, HTTP only)
  hosts: all
  connection: local
  become: yes
  vars:
    # Домен больше не нужен – используем IP
    app_port: 8080
    project_dir: /opt/myapp

  tasks:
    # ============================================================
    # 1. Базовые пакеты (без Certbot)
    # ============================================================
    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install required system packages
      ansible.builtin.apt:
        name:
          - git
          - nginx
          # certbot и python3-certbot-nginx удалены
        state: present

    # ============================================================
    # 2. Установка Docker (официальный скрипт)
    # ============================================================
    - name: Remove existing Docker packages (to avoid conflicts)
      ansible.builtin.apt:
        name:
          - docker
          - docker-engine
          - docker.io
          - containerd
          - runc
        state: absent
        purge: yes
      failed_when: false

    - name: Install Docker using official script
      ansible.builtin.shell:
        cmd: |
          curl -fsSL https://get.docker.com -o get-docker.sh
          sh get-docker.sh
      args:
        creates: /usr/bin/docker
      register: docker_install

    - name: Ensure Docker service is running and enabled
      ansible.builtin.service:
        name: docker
        state: started
        enabled: yes

    - name: Install Docker Compose plugin
      ansible.builtin.apt:
        name: docker-compose-plugin
        state: present

    # ============================================================
    # 3. Копирование кода
    # ============================================================
    - name: Create application directory
      ansible.builtin.file:
        path: "{{ project_dir }}"
        state: directory
        owner: root
        group: root
        mode: '0755'

    - name: Copy project files to /opt/myapp
      ansible.builtin.shell:
        cmd: |
          rm -rf {{ project_dir }}/*
          cp -r ~/Devops/* {{ project_dir }}/
      args:
        creates: "{{ project_dir }}/docker-compose.yml"

    # ============================================================
    # 4. Управление контейнерами через docker compose
    # ============================================================
    - name: Stop and remove old containers (if any)
      ansible.builtin.shell:
        cmd: docker compose down --remove-orphans
        chdir: "{{ project_dir }}"
      failed_when: false

    - name: Force remove conflicting containers by name
      ansible.builtin.shell:
        cmd: docker rm -f blackbox prometheus grafana node-exporter devops-myapp-1 myapp-myapp-1 2>/dev/null || true
      changed_when: false

    - name: Pull latest images
      ansible.builtin.shell:
        cmd: docker compose pull
        chdir: "{{ project_dir }}"
      failed_when: false

    - name: Start containers
      ansible.builtin.shell:
        cmd: docker compose up -d --remove-orphans --force-recreate
        chdir: "{{ project_dir }}"

    # ============================================================
    # 5. Настройка Nginx (прокси на HTTP, без SSL)
    # ============================================================
    - name: Copy nginx config for IP (no domain)
      ansible.builtin.template:
        src: templates/nginx.conf.j2
        dest: /etc/nginx/sites-available/default   # используем default
        owner: root
        group: root
        mode: '0644'

    # Включать ничего не надо – по умолчанию default уже включён.
    # Но если есть другие конфиги, удаляем их.
    - name: Remove any other enabled sites
      ansible.builtin.shell:
        cmd: rm -f /etc/nginx/sites-enabled/*
      failed_when: false

    - name: Enable our default config
      ansible.builtin.file:
        src: /etc/nginx/sites-available/default
        dest: /etc/nginx/sites-enabled/default
        state: link

    - name: Reload nginx
      ansible.builtin.service:
        name: nginx
        state: reloaded

  handlers:
    - name: Reload nginx
      ansible.builtin.service:
        name: nginx
        state: reloaded