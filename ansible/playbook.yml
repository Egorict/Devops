---
- name: Configure web server with Docker, Nginx, and HTTPS
  hosts: all
  connection: local
  become: yes
  vars:
    app_dir: /opt/myapp
    repo_url: https://github.com/Egorict/Devops.git
    domain_name: www.apollonovaalisaviachislavovna.ru
    app_port: 8080
    admin_email: admin@apollonovaalisaviachislavovna.ru

  tasks:
    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install required system packages (git, nginx, certbot)
      ansible.builtin.apt:
        name:
          - git
          - nginx
          - certbot
          - python3-certbot-nginx
        state: present

    - name: Remove any existing Docker packages (to avoid conflicts)
      ansible.builtin.apt:
        name:
          - docker
          - docker-engine
          - docker.io
          - containerd
          - runc
        state: absent
        purge: yes
      failed_when: false
    - name: Install Docker using official script
      ansible.builtin.shell:
        cmd: |
          curl -fsSL https://get.docker.com -o get-docker.sh
          sh get-docker.sh
      args:
        creates: /usr/bin/docker
      register: docker_install

    - name: Ensure Docker service is running and enabled
      ansible.builtin.service:
        name: docker
        state: started
        enabled: yes

    - name: Install Docker Compose plugin (if not installed)
      ansible.builtin.apt:
        name: docker-compose-plugin
        state: present

    - name: Create application directory
      ansible.builtin.file:
        path: "{{ app_dir }}"
        state: directory
        owner: root
        group: root
        mode: '0755'

    - name: Clone repository
      ansible.builtin.git:
        repo: "{{ repo_url }}"
        dest: "{{ app_dir }}"
        version: master
        force: yes

    - name: Run docker compose up
      ansible.builtin.shell:
        cmd: docker compose up -d
        chdir: "{{ app_dir }}"

    - name: Copy nginx config for domain
      ansible.builtin.template:
        src: templates/nginx.conf.j2
        dest: /etc/nginx/sites-available/{{ domain_name }}
        owner: root
        group: root
        mode: '0644'

    - name: Enable nginx site
      ansible.builtin.file:
        src: /etc/nginx/sites-available/{{ domain_name }}
        dest: /etc/nginx/sites-enabled/{{ domain_name }}
        state: link

    - name: Disable default nginx site
      ansible.builtin.file:
        path: /etc/nginx/sites-enabled/default
        state: absent

    - name: Reload nginx (pre-certbot)
      ansible.builtin.service:
        name: nginx
        state: reloaded

    - name: Obtain SSL certificate via Certbot
      ansible.builtin.shell:
        cmd: certbot --nginx -d {{ domain_name }} -d www.{{ domain_name }} --non-interactive --agree-tos --email {{ admin_email }} --redirect
      args:
        creates: /etc/letsencrypt/live/{{ domain_name }}/fullchain.pem
      notify: Reload nginx

    - name: Setup cron job for backup
      ansible.builtin.cron:
        name: "Daily backup"
        minute: "0"
        hour: "2"
        job: "{{ app_dir }}/backup.sh"
        user: root
        state: present

  handlers:
    - name: Reload nginx
      ansible.builtin.service:
        name: nginx
        state: reloaded