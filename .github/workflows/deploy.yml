name: CI/CD Pipeline

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

permissions:
  contents: read
  security-events: write   # нужно для CodeQL и Trivy
  actions: read
  checks: write
  pull-requests: write
  issues: write
  id-token: write

env:
  REGISTRY: docker.io
  IMAGE_NAME: ermakov880/myapp

jobs:
  # ============================================================
  # 1. КАЧЕСТВО КОДА (Линтер)
  # ============================================================
  lint:
    runs-on: ubuntu-latest
    name: Lint Code Base
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Super-Linter
        uses: super-linter/super-linter@v6
        env:
          DEFAULT_BRANCH: master
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Включаем проверку всех типов файлов в репозитории
          VALIDATE_ALL_CODEBASE: true
          # Если найдутся ошибки, пайплайн упадёт
          FAIL_IF_FOUND_ERRORS: true

  # ============================================================
  # 2. БЕЗОПАСНОСТЬ: ПОИСК СЕКРЕТОВ В КОДЕ
  # ============================================================
  secrets:
    runs-on: ubuntu-latest
    name: Scan for Secrets
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Нужно для сканирования всей истории

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Если найдутся секреты — пайплайн упадёт
          FAIL_ON_FOUND: true

  # ============================================================
  # 3. БЕЗОПАСНОСТЬ: УЯЗВИМОСТИ КОДА (SAST)
  # ============================================================
  sast:
    runs-on: ubuntu-latest
    name: CodeQL Security Scan
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript  # или javascript, go и т.д.

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

  # ============================================================
  # 4. СБОРКА, ТЕСТЫ И СКАНИРОВАНИЕ ОБРАЗА
  # ============================================================
  build-and-scan:
    runs-on: ubuntu-latest
    # Зависимости: сначала должны пройти все проверки
    needs: [lint, secrets, sast]
    # Если это Pull Request — только собираем и сканируем, но не пушим
    if: github.event_name == 'push' || github.event.pull_request.head.repo.fork == false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ----- 4.1 Логин в Docker Hub (только для пуша) -----
      - name: Login to Docker Hub
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      # ----- 4.2 Сборка Docker-образа -----
      - name: Build Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false  # Сначала только собираем
          load: true   # Загружаем образ в локальный докер раннера
          tags: ${{ env.IMAGE_NAME }}:test

      # ----- 4.3 Сканирование уязвимостей образа (Trivy) -----
      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@0.19.0
        with:
          image-ref: ${{ env.IMAGE_NAME }}:test
          format: 'table'
          output: 'trivy-results.sarif'
          exit-code: '0'  # Если найдёт уязвимости — пайплайн упадёт
          severity: 'CRITICAL,HIGH'  # Сканируем только критические и высокие

      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'

      # ----- 4.4 Пуш образа (только для пуша в master) -----
      - name: Push Docker image
        if: github.event_name == 'push'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

  # ============================================================
  # 5. ДЕПЛОЙ НА СЕРВЕР (только для пуша в master)
  # ============================================================
  deploy:
    runs-on: ubuntu-latest
    needs: build-and-scan
    if: github.event_name == 'push'
    name: Deploy to Server

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd Devops
            git pull
            docker compose pull
            docker compose up -d --remove-orphans