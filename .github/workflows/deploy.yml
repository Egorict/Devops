name: CI/CD Pipeline

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

permissions:
  contents: read
  security-events: write
  actions: read
  checks: write
  pull-requests: write
  issues: write
  id-token: write

env:
  REGISTRY: docker.io
  IMAGE_NAME: ermakov880/myapp

jobs:
  # ============================================================
  # 1. КАЧЕСТВО КОДА (Линтер)
  # ============================================================
  lint:
    runs-on: ubuntu-latest
    name: Lint Code Base
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Super-Linter
        uses: super-linter/super-linter@v6
        env:
          DEFAULT_BRANCH: master
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VALIDATE_ALL_CODEBASE: true
          FAIL_IF_FOUND_ERRORS: true

  # ============================================================
  # 2. БЕЗОПАСНОСТЬ: ПОИСК СЕКРЕТОВ
  # ============================================================
  secrets:
    runs-on: ubuntu-latest
    name: Scan for Secrets
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FAIL_ON_FOUND: true

  # ============================================================
  # 3. БЕЗОПАСНОСТЬ: УЯЗВИМОСТИ КОДА (CodeQL)
  # ============================================================
  # sast:
  #   runs-on: ubuntu-latest
  #   name: CodeQL Security Scan
  #   steps:
  #     - name: Checkout code
  #       uses: actions/checkout@v4

  #     - name: Initialize CodeQL
  #       uses: github/codeql-action/init@v3
  #       with:
  #         languages: javascript

  #     - name: Autobuild
  #       uses: github/codeql-action/autobuild@v3

  #     - name: Perform CodeQL Analysis
  #       uses: github/codeql-action/analyze@v3

  # ============================================================
  # 4. СБОРКА ОБРАЗА И СКАНИРОВАНИЕ
  # ============================================================
  build-and-scan:
    runs-on: ubuntu-latest
    needs: [lint, secrets]
    if: github.event_name == 'push' || github.event.pull_request.head.repo.fork == false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: ${{ env.IMAGE_NAME }}:test

      # ----- Сканирование уязвимостей образа (Trivy) -----
      # - name: Scan image with Trivy
      #   uses: aquasecurity/trivy-action@master
      #   with:
      #     image-ref: ${{ env.IMAGE_NAME }}:test
      #     format: 'sarif'
      #     output: 'trivy-results.sarif'
      #     exit-code: '0'                # пайплайн упадёт при HIGH/CRITICAL
      #     severity: 'CRITICAL'

      # - name: Upload Trivy results to GitHub Security tab
      #   uses: github/codeql-action/upload-sarif@v3
      #   with:
      #     sarif_file: 'trivy-results.sarif'

      # ----- Пуш образа (только для пуша в master) -----
      - name: Push Docker image
        if: github.event_name == 'push'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

  # ============================================================
  # 5. ДЕПЛОЙ (только пуши в master)
  # ============================================================
  deploy:
    runs-on: ubuntu-latest
    needs: build-and-scan
    if: github.event_name == 'push'
    name: Deploy to Server

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # 1. Установить Git (если нет) – нужно для клонирования 
            if ! command -v git &> /dev/null; then
              sudo apt update && sudo apt install -y git
            fi

            # 2. Клонировать/обновить репозиторий
            if [ ! -d "Devops" ]; then
              git clone https://github.com/Egorict/Devops.git
            fi
            cd Devops
            git pull origin master

            # 3. Установить Ansible (если нет)
            if ! command -v ansible-playbook &> /dev/null; then
              sudo apt update && sudo apt install -y ansible
            fi

            # 4. Всю остальную магию делает Ansible
            ansible-playbook ansible/playbook.yml -i localhost, -c local

            