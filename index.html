<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>💕 ЛЮБЛЮ АЛИСА</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      min-height: 100dvh;
      background: radial-gradient(ellipse at 30% 40%, #2d0a1e, #120810);
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Arial Black', 'Comic Sans MS', cursive, sans-serif;
      overflow: hidden;
      position: relative;
      padding: 10px;
    }

    /* легкий фон без лишних слоев */
    .bg-glow {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
      background: 
        radial-gradient(ellipse at 20% 30%, rgba(255, 100, 180, 0.06), transparent 50%),
        radial-gradient(ellipse at 80% 70%, rgba(255, 50, 150, 0.06), transparent 50%);
    }

    .love-container {
      position: relative;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      max-width: 1200px;
      height: 100vh;
      height: 100dvh;
      padding: 15px;
    }

    /* главная надпись — мягко дышит */
    .main-text {
      font-size: clamp(3.5rem, 18vw, 10rem);
      font-weight: 900;
      text-align: center;
      letter-spacing: clamp(4px, 1.5vw, 14px);
      background: linear-gradient(135deg, #ffb3d9, #ff66b2, #ff99cc, #ffb3d9, #ff80bf);
      background-size: 300% 300%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: 0 0 30px rgba(255, 80, 160, 0.12), 0 0 60px rgba(255, 50, 130, 0.08);
      animation: gradShift 12s infinite alternate, breathe 4s infinite alternate ease-in-out;
      line-height: 1.1;
      filter: drop-shadow(0 0 40px rgba(255, 80, 160, 0.1));
      padding: 0 5px;
      word-break: break-word;
      user-select: none;
    }

    @keyframes gradShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    @keyframes breathe {
      0% { transform: scale(1) rotate(-0.15deg); }
      50% { transform: scale(1.015) rotate(0.15deg); }
      100% { transform: scale(1) rotate(-0.15deg); }
    }

    /* плавающие элементы — только самое нужное, без перебора */
    .float-item {
      position: absolute;
      pointer-events: none;
      z-index: 20;
      font-size: clamp(1.6rem, 3.5vw, 3.2rem);
      filter: drop-shadow(0 0 15px rgba(255, 80, 160, 0.15));
      animation: floatAround 16s infinite alternate ease-in-out;
      opacity: 0.5;
      user-select: none;
      will-change: transform;
    }

    .float-item.kiss {
      font-size: clamp(2rem, 4.5vw, 4rem);
      filter: drop-shadow(0 0 20px rgba(255, 100, 180, 0.2));
    }

    .float-item.small {
      font-size: clamp(1rem, 2vw, 1.6rem);
      opacity: 0.35;
    }

    @keyframes floatAround {
      0% { transform: translate(0, 0) scale(0.9) rotate(0deg); }
      25% { transform: translate(25px, -45px) scale(1.1) rotate(6deg); }
      50% { transform: translate(-35px, 30px) scale(0.85) rotate(-8deg); }
      75% { transform: translate(45px, 20px) scale(1.15) rotate(10deg); }
      100% { transform: translate(-15px, -20px) scale(0.95) rotate(-4deg); }
    }

    /* второй тип анимации для разнообразия */
    .float-item.float2 {
      animation: floatAround2 18s infinite alternate ease-in-out;
    }

    @keyframes floatAround2 {
      0% { transform: translate(0, 0) scale(0.95) rotate(0deg); }
      33% { transform: translate(-40px, 35px) scale(1.1) rotate(-8deg); }
      66% { transform: translate(35px, -40px) scale(0.9) rotate(8deg); }
      100% { transform: translate(15px, 15px) scale(1.05) rotate(-3deg); }
    }

    /* маленькие пузыри — фоновая атмосфера */
    .bubble {
      position: absolute;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, rgba(255, 150, 200, 0.05), rgba(255, 80, 150, 0.01));
      border: 1px solid rgba(255, 150, 200, 0.04);
      box-shadow: 0 0 40px rgba(255, 80, 150, 0.02);
      pointer-events: none;
      z-index: 2;
      animation: bubbleRise 35s infinite alternate ease-in-out;
    }

    @keyframes bubbleRise {
      0% { transform: translateY(6vh) scale(0.8); opacity: 0.04; }
      50% { opacity: 0.1; }
      100% { transform: translateY(-6vh) scale(1.1); opacity: 0.02; }
    }

    /* адаптация под все экраны */
    @media (max-width: 768px) {
      .float-item { font-size: clamp(1.2rem, 3vw, 2rem); }
      .float-item.kiss { font-size: clamp(1.6rem, 4vw, 2.8rem); }
    }

    @media (max-width: 480px) {
      .float-item { font-size: clamp(0.9rem, 2.8vw, 1.6rem); }
      .float-item.kiss { font-size: clamp(1.2rem, 3.5vw, 2.2rem); }
      .float-item.small { font-size: clamp(0.7rem, 2vw, 1.2rem); }
    }

    @media (orientation: landscape) and (max-height: 500px) {
      .main-text {
        font-size: clamp(2rem, 10vh, 4.5rem);
      }
      .float-item {
        font-size: clamp(0.8rem, 2.5vh, 1.6rem);
      }
    }

    @media (min-width: 1400px) {
      .float-item { font-size: clamp(2.4rem, 2.5vw, 3.8rem); }
      .float-item.kiss { font-size: clamp(3rem, 3.5vw, 4.8rem); }
    }
  </style>
</head>
<body>

  <div class="bg-glow"></div>

  <div class="love-container" id="loveContainer">
    <div class="main-text">ЛЮБЛЮ АЛИСА</div>
  </div>

  <script>
    (function() {
      const container = document.getElementById('loveContainer');

      // ---- СОЗДАЁМ МИНИМАЛЬНОЕ КОЛИЧЕСТВО ПЛАВАЮЩИХ ЭЛЕМЕНТОВ ----
      // всего 20 элементов: 10 сердец, 6 поцелуев, 4 милых дополнения
      const emojis = [
        '❤️', '💖', '💗', '💓', '💘', '💝', '♥️', '💕', '💞', '💟',
        '💋', '💋', '💋', '💋', '💋', '💋',
        '🌸', '🌷', '🌹', '🎀'
      ];

      // создаём только 20 элементов
      const count = 20;
      for (let i = 0; i < count; i++) {
        const el = document.createElement('div');
        el.className = 'float-item';

        // половина элементов с альтернативной анимацией
        if (i % 2 === 0) el.classList.add('float2');

        const emoji = emojis[i % emojis.length];
        el.textContent = emoji;

        if (emoji === '💋') el.classList.add('kiss');
        if (i % 5 === 0) el.classList.add('small');

        // равномерное распределение по экрану
        const x = 5 + (i % 10) * 9 + Math.random() * 3;
        const y = 5 + Math.floor(i / 5) * 20 + Math.random() * 8;
        el.style.left = x + '%';
        el.style.top = y + '%';

        // разные задержки для плавности
        const delay = (i * 0.6) % 10;
        const duration = 14 + (i % 7) * 0.8;
        el.style.animationDelay = delay + 's';
        el.style.animationDuration = duration + 's';
        el.style.opacity = 0.4 + (i % 4) * 0.08;

        container.appendChild(el);
      }

      // ---- МАЛЕНЬКИЕ ПУЗЫРИ (всего 6 штук) ----
      for (let i = 0; i < 6; i++) {
        const bubble = document.createElement('div');
        bubble.className = 'bubble';
        const size = 50 + i * 20;
        bubble.style.width = size + 'px';
        bubble.style.height = size + 'px';
        bubble.style.left = (5 + i * 15) + '%';
        bubble.style.top = (10 + i * 12) + '%';
        bubble.style.animationDelay = (i * 2) + 's';
        bubble.style.animationDuration = (28 + i * 3) + 's';
        container.appendChild(bubble);
      }

      // ---- ПЕРИОДИЧЕСКАЯ ЗАМЕНА (очень редко, чтобы не перегружать) ----
      setInterval(() => {
        const items = container.querySelectorAll('.float-item');
        if (items.length > 22) {
          // удаляем только если их стало слишком много
          for (let i = 0; i < 2 && i < items.length; i++) {
            if (Math.random() > 0.7) {
              items[i].remove();
            }
          }
        }
        // добавляем 1 новый элемент раз в 10 секунд
        if (items.length < 25) {
          const el = document.createElement('div');
          el.className = 'float-item';
          if (Math.random() > 0.5) el.classList.add('float2');
          const extra = ['❤️', '💖', '💗', '💋', '🌸', '🌷', '🎀'];
          const emoji = extra[Math.floor(Math.random() * extra.length)];
          el.textContent = emoji;
          if (emoji === '💋') el.classList.add('kiss');
          if (Math.random() > 0.7) el.classList.add('small');
          el.style.left = (5 + Math.random() * 90) + '%';
          el.style.top = (5 + Math.random() * 90) + '%';
          el.style.animationDelay = (Math.random() * 4) + 's';
          el.style.animationDuration = (14 + Math.random() * 8) + 's';
          el.style.opacity = 0.4 + Math.random() * 0.3;
          container.appendChild(el);
        }
      }, 10000);

    })();
  </script>

</body>
</html>
