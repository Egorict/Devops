<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>💕 абсурдно-мило 💕</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: radial-gradient(circle at 30% 40%, #2d0a1e, #120810);
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', 'Arial Black', 'Comic Sans MS', cursive, sans-serif;
      overflow: hidden;
      position: relative;
    }

    /* нежный мерцающий фон */
    .bg-glitter {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
      background: radial-gradient(ellipse at 20% 30%, rgba(255, 100, 150, 0.08), transparent 60%),
                  radial-gradient(ellipse at 80% 70%, rgba(255, 50, 130, 0.08), transparent 60%);
    }

    /* облака маленьких сердечек (фон) */
    .cloud-hearts {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1;
      overflow: hidden;
    }

    .cloud-heart {
      position: absolute;
      font-size: 1.2rem;
      opacity: 0.15;
      animation: cloudFloat 18s infinite alternate ease-in-out;
      color: #ff88bb;
      text-shadow: 0 0 20px #ff66aa, 0 0 40px #ff3399;
    }

    @keyframes cloudFloat {
      0% { transform: translateY(10vh) translateX(-10vw) scale(0.8) rotate(-5deg); opacity: 0.08; }
      50% { opacity: 0.2; }
      100% { transform: translateY(-10vh) translateX(10vw) scale(1.4) rotate(5deg); opacity: 0.15; }
    }

    /* основной контейнер — всё плавно и абсурдно */
    .love-bubble {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100vw;
      height: 100vh;
      pointer-events: none;
    }

    /* центральная надпись — нежная, пухлая, слегка дышит */
    .main-text {
      font-size: clamp(4rem, 20vw, 10rem);
      font-weight: 900;
      text-align: center;
      letter-spacing: 8px;
      background: linear-gradient(135deg, #ff99cc, #ff66b2, #ff99cc, #ffb3d9);
      background-size: 300% 300%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 0 40px rgba(255, 80, 150, 0.3), 0 0 80px rgba(255, 50, 130, 0.2);
      animation: gentleGradient 8s infinite alternate, breathe 3s infinite alternate ease-in-out;
      transform-origin: center;
      font-family: 'Arial Black', 'Comic Sans MS', cursive, sans-serif;
      line-height: 1.1;
      filter: drop-shadow(0 0 30px rgba(255, 80, 160, 0.2));
      transition: all 0.1s;
    }

    @keyframes gentleGradient {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    @keyframes breathe {
      0% { transform: scale(1) rotate(-0.3deg); }
      50% { transform: scale(1.03) rotate(0.3deg); }
      100% { transform: scale(1) rotate(-0.3deg); }
    }

    /* маленькая подпись — милый абсурд */
    .sub-text {
      margin-top: 20px;
      font-size: clamp(1.2rem, 4vw, 2.6rem);
      color: #ffb3d9;
      text-shadow: 0 0 30px #ff66aa, 0 0 60px #ff3399;
      letter-spacing: 6px;
      animation: subPulse 4s infinite alternate ease-in-out;
      font-family: 'Comic Sans MS', 'Segoe UI', cursive;
      opacity: 0.8;
      font-weight: 300;
    }

    @keyframes subPulse {
      0% { opacity: 0.5; transform: scale(0.98) rotate(-1deg); text-shadow: 0 0 20px #ff66aa; }
      100% { opacity: 1; transform: scale(1.04) rotate(1deg); text-shadow: 0 0 50px #ff99cc, 0 0 80px #ff66aa; }
    }

    /* плавающие сердечки и поцелуйчики — абсурдно много, но нежно */
    .float-item {
      position: absolute;
      pointer-events: none;
      z-index: 20;
      font-size: 2.2rem;
      filter: drop-shadow(0 0 20px rgba(255, 80, 160, 0.3)) drop-shadow(0 0 40px rgba(255, 50, 130, 0.2));
      animation: floatAround 12s infinite alternate ease-in-out;
      opacity: 0.7;
      transition: all 0.1s;
    }

    .float-item.kiss {
      font-size: 2.8rem;
      filter: drop-shadow(0 0 30px rgba(255, 100, 180, 0.4));
    }

    .float-item.small {
      font-size: 1.4rem;
      opacity: 0.5;
    }

    .float-item.big {
      font-size: 3.6rem;
      opacity: 0.6;
    }

    @keyframes floatAround {
      0% { transform: translate(0, 0) scale(0.9) rotate(0deg); }
      15% { transform: translate(40px, -80px) scale(1.2) rotate(12deg); }
      30% { transform: translate(-60px, 50px) scale(0.8) rotate(-15deg); }
      45% { transform: translate(90px, 30px) scale(1.5) rotate(25deg); }
      60% { transform: translate(-40px, -70px) scale(1.1) rotate(-10deg); }
      75% { transform: translate(70px, -40px) scale(0.9) rotate(18deg); }
      100% { transform: translate(-20px, 20px) scale(1.3) rotate(-5deg); }
    }

    /* второй набор анимаций для разнообразия */
    .float-item.float2 {
      animation: floatAround2 14s infinite alternate ease-in-out;
    }

    @keyframes floatAround2 {
      0% { transform: translate(0, 0) scale(1) rotate(0deg); }
      20% { transform: translate(-80px, 60px) scale(1.3) rotate(-20deg); }
      40% { transform: translate(70px, -90px) scale(0.7) rotate(15deg); }
      60% { transform: translate(-50px, -30px) scale(1.6) rotate(-8deg); }
      80% { transform: translate(100px, 50px) scale(0.9) rotate(30deg); }
      100% { transform: translate(10px, -10px) scale(1.1) rotate(-3deg); }
    }

    .float-item.float3 {
      animation: floatAround3 10s infinite alternate ease-in-out;
    }

    @keyframes floatAround3 {
      0% { transform: translate(0, 0) scale(0.8) rotate(0deg); }
      25% { transform: translate(60px, 80px) scale(1.4) rotate(-25deg); }
      50% { transform: translate(-90px, -50px) scale(1.1) rotate(20deg); }
      75% { transform: translate(40px, -100px) scale(0.6) rotate(-15deg); }
      100% { transform: translate(-30px, 40px) scale(1.2) rotate(10deg); }
    }

    /* дополнительные маленькие звёздочки-блестки */
    .sparkle {
      position: absolute;
      pointer-events: none;
      z-index: 5;
      font-size: 0.9rem;
      opacity: 0.25;
      animation: sparkleDrift 20s infinite linear;
      color: #ffaacc;
      text-shadow: 0 0 20px #ff66aa;
    }

    @keyframes sparkleDrift {
      0% { transform: translateY(110vh) translateX(-10vw) rotate(0deg); opacity: 0; }
      10% { opacity: 0.3; }
      90% { opacity: 0.3; }
      100% { transform: translateY(-10vh) translateX(10vw) rotate(360deg); opacity: 0; }
    }

    /* очень милые "пузыри" с сердечками */
    .bubble {
      position: absolute;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, rgba(255, 150, 200, 0.08), rgba(255, 80, 150, 0.02));
      border: 1px solid rgba(255, 150, 200, 0.1);
      box-shadow: 0 0 60px rgba(255, 80, 150, 0.05), inset 0 0 60px rgba(255, 80, 150, 0.02);
      pointer-events: none;
      z-index: 2;
      animation: bubbleRise 25s infinite alternate ease-in-out;
    }

    @keyframes bubbleRise {
      0% { transform: translateY(10vh) scale(0.8); opacity: 0.1; }
      50% { opacity: 0.3; }
      100% { transform: translateY(-10vh) scale(1.2); opacity: 0.05; }
    }

    /* адаптив */
    @media (max-width: 600px) {
      .float-item { font-size: 1.8rem; }
      .float-item.kiss { font-size: 2.2rem; }
      .float-item.big { font-size: 2.8rem; }
    }
  </style>
</head>
<body>

  <!-- нежный фон -->
  <div class="bg-glitter"></div>

  <!-- облачко маленьких сердец (фон) -->
  <div class="cloud-hearts" id="cloudHearts"></div>

  <!-- пузыри -->
  <div id="bubblesContainer"></div>

  <!-- блёстки -->
  <div id="sparklesContainer"></div>

  <!-- основной контейнер -->
  <div class="love-bubble" id="loveBubble">
    <div class="main-text">ЛЮБЛЮ АЛИСА</div>
    <div class="sub-text">💕 бесконечно и абсурдно 💕</div>
  </div>

  <script>
    (function() {
      // ---- СОЗДАЁМ ОБЛАКО МАЛЕНЬКИХ СЕРДЕЦ (фон) ----
      const cloudContainer = document.getElementById('cloudHearts');
      const heartEmojis = ['♥', '❤', '♡', '❤️', '♥️'];
      for (let i = 0; i < 50; i++) {
        const span = document.createElement('span');
        span.className = 'cloud-heart';
        span.textContent = heartEmojis[Math.floor(Math.random() * heartEmojis.length)];
        span.style.left = Math.random() * 100 + '%';
        span.style.top = Math.random() * 100 + '%';
        span.style.fontSize = (0.8 + Math.random() * 2.2) + 'rem';
        span.style.animationDelay = (Math.random() * 20) + 's';
        span.style.animationDuration = (15 + Math.random() * 20) + 's';
        span.style.opacity = 0.05 + Math.random() * 0.15;
        cloudContainer.appendChild(span);
      }

      // ---- ПУЗЫРИ ----
      const bubblesContainer = document.getElementById('bubblesContainer');
      for (let i = 0; i < 12; i++) {
        const bubble = document.createElement('div');
        bubble.className = 'bubble';
        const size = 40 + Math.random() * 180;
        bubble.style.width = size + 'px';
        bubble.style.height = size + 'px';
        bubble.style.left = Math.random() * 100 + '%';
        bubble.style.top = Math.random() * 100 + '%';
        bubble.style.animationDelay = (Math.random() * 25) + 's';
        bubble.style.animationDuration = (20 + Math.random() * 20) + 's';
        bubblesContainer.appendChild(bubble);
      }

      // ---- БЛЁСТКИ (звёздочки) ----
      const sparklesContainer = document.getElementById('sparklesContainer');
      const sparkleSymbols = ['✦', '✧', '⭐', '✨', '💫', '✶', '⋆'];
      for (let i = 0; i < 30; i++) {
        const sp = document.createElement('div');
        sp.className = 'sparkle';
        sp.textContent = sparkleSymbols[Math.floor(Math.random() * sparkleSymbols.length)];
        sp.style.left = Math.random() * 100 + '%';
        sp.style.top = Math.random() * 100 + '%';
        sp.style.fontSize = (0.6 + Math.random() * 1.6) + 'rem';
        sp.style.animationDelay = (Math.random() * 20) + 's';
        sp.style.animationDuration = (15 + Math.random() * 25) + 's';
        sp.style.opacity = 0.1 + Math.random() * 0.25;
        sparklesContainer.appendChild(sp);
      }

      // ---- ГЛАВНЫЕ ЛЕТАЮЩИЕ СЕРДЦА И ПОЦЕЛУИ (абсурдно-мило) ----
      const container = document.getElementById('loveBubble');
      const items = [
        '❤️', '❤️', '💖', '💗', '💓', '💘', '💝', '♥️', '💕', '💞', '💟',
        '💋', '💋', '💋', '💋', '💋', '💋', '💋', '💋', '💋', '💋',  // много поцелуев
        '❤️‍🔥', '🌸', '🌺', '💐', '🌷', '🌹', '🥰', '😘', '😍'
      ];

      // создаём 60+ элементов с разными классами анимации
      for (let i = 0; i < 70; i++) {
        const el = document.createElement('div');
        el.className = 'float-item';

        // случайный класс анимации
        const animClass = Math.floor(Math.random() * 3);
        if (animClass === 0) el.classList.add('float2');
        else if (animClass === 1) el.classList.add('float3');
        // иначе стандартный floatAround

        // выбор emoji
        let emoji = items[Math.floor(Math.random() * items.length)];
        el.textContent = emoji;

        // если поцелуй — добавляем класс kiss
        if (emoji === '💋' || emoji === '💋' || emoji === '💋' || emoji === '💋') {
          el.classList.add('kiss');
        }

        // случайный размер
        const sizeRand = Math.random();
        if (sizeRand < 0.25) el.classList.add('small');
        else if (sizeRand < 0.55) el.classList.add('big');

        // позиция
        el.style.left = (5 + Math.random() * 90) + '%';
        el.style.top = (5 + Math.random() * 90) + '%';

        // задержка и длительность
        const delay = Math.random() * 8;
        const duration = 10 + Math.random() * 14;
        el.style.animationDelay = delay + 's';
        el.style.animationDuration = duration + 's';

        // небольшой разброс opacity
        el.style.opacity = 0.4 + Math.random() * 0.5;

        container.appendChild(el);
      }

      // ---- ДОБАВЛЯЕМ ЕЩЁ НЕСКОЛЬКО "АБСУРДНЫХ" ЭЛЕМЕНТОВ (плюшевые мишки, цветочки) ----
      const extraItems = ['🧸', '🐻', '🐼', '🌸', '🌼', '🌻', '🍬', '🍭', '🎀', '💝', '💘', '💖'];
      for (let i = 0; i < 18; i++) {
        const el = document.createElement('div');
        el.className = 'float-item';
        el.classList.add('float2');
        if (Math.random() > 0.6) el.classList.add('float3');
        el.textContent = extraItems[Math.floor(Math.random() * extraItems.length)];
        el.style.left = (5 + Math.random() * 90) + '%';
        el.style.top = (5 + Math.random() * 90) + '%';
        el.style.fontSize = (1.8 + Math.random() * 2.5) + 'rem';
        el.style.animationDelay = (Math.random() * 10) + 's';
        el.style.animationDuration = (12 + Math.random() * 16) + 's';
        el.style.opacity = 0.3 + Math.random() * 0.5;
        container.appendChild(el);
      }

      // ---- ПЕРИОДИЧЕСКИ ДОБАВЛЯЕМ НОВЫЕ ЭЛЕМЕНТЫ, ЧТОБЫ НЕ БЫЛО СКУЧНО ----
      setInterval(() => {
        // удаляем несколько старых (не более 5)
        const allItems = container.querySelectorAll('.float-item');
        if (allItems.length > 80) {
          for (let i = 0; i < 5 && i < allItems.length; i++) {
            if (Math.random() > 0.6) {
              allItems[i].remove();
            }
          }
        }

        // добавляем 2-3 новых
        const newCount = 2 + Math.floor(Math.random() * 3);
        for (let j = 0; j < newCount; j++) {
          const el = document.createElement('div');
          el.className = 'float-item';
          const animClass = Math.floor(Math.random() * 3);
          if (animClass === 0) el.classList.add('float2');
          else if (animClass === 1) el.classList.add('float3');

          const allEmojis = [...items, ...extraItems];
          let emoji = allEmojis[Math.floor(Math.random() * allEmojis.length)];
          el.textContent = emoji;
          if (emoji === '💋') el.classList.add('kiss');

          if (Math.random() < 0.25) el.classList.add('small');
          else if (Math.random() < 0.5) el.classList.add('big');

          el.style.left = (5 + Math.random() * 90) + '%';
          el.style.top = (5 + Math.random() * 90) + '%';
          el.style.animationDelay = (Math.random() * 4) + 's';
          el.style.animationDuration = (10 + Math.random() * 14) + 's';
          el.style.opacity = 0.4 + Math.random() * 0.5;
          container.appendChild(el);
        }
      }, 5000);

    })();
  </script>

</body>
</html>
